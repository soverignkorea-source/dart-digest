name: Daily DART Digest

on:
  schedule:
    - cron: "0 21 * * 0-4"  # 한국시간 월~금 오전 6시
    - cron: "0 9 * * 1-5"   # 한국시간 월~금 오후 6시
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests beautifulsoup4 pandas lxml

      - name: Generate digest
        run: python scripts/generate_digest.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "Auto update digest" && git push)
